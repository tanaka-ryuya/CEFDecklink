name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v1.0.0)'
        required: true
        default: 'latest'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up CEF (Chromium Embedded Framework)
      shell: powershell
      run: |
        $url = powershell -File scripts/find_cef.ps1
        Write-Host "Downloading CEF from $url ..."
        New-Item -ItemType Directory -Force -Path vender
        Invoke-WebRequest -Uri $url -OutFile vender/cef.tar.bz2
        Write-Host "Extracting CEF..."
        tar -xf vender/cef.tar.bz2 -C vender
        $extractedDir = Get-ChildItem -Path vender -Filter "cef_binary_*" -Directory | Select-Object -First 1
        Rename-Item -Path $extractedDir.FullName -NewName "cef"
        Write-Host "CEF setup completed."

    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build Project (Release)
      run: cmake --build build --config Release --parallel

    - name: Create Release ZIP
      shell: powershell
      run: |
        Compress-Archive -Path build/Release/* -DestinationPath build/CEFDecklink-Release.zip
        Write-Host "ZIP package created."

    - name: Build Installer
      run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

    - name: Resolve tag name
      id: resolve_tag
      shell: powershell
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $tag = "${{ github.event.inputs.tag_name }}"
        } else {
          $tag = "${{ github.ref_name }}"
        }
        Write-Host "tag=$tag"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Create and push tag (manual run only)
      if: github.event_name == 'workflow_dispatch'
      shell: powershell
      run: |
        $tag = "${{ steps.resolve_tag.outputs.tag }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Delete existing tag if present (ignore errors if tag doesn't exist)
        git tag -d $tag 2>&1 | Out-Null
        git push origin ":refs/tags/$tag" 2>&1 | Out-Null
        Write-Host "Cleaned old tag (if existed)"
        git tag $tag
        git push origin $tag
        Write-Host "Tag '$tag' created and pushed."

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.resolve_tag.outputs.tag }}
        files: |
          build/CEFDecklink-Release.zip
          build/CEFDecklink-Setup.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
