name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v1.0.0)'
        required: true
        default: 'latest'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up CEF (Chromium Embedded Framework)
      shell: powershell
      run: |
        $url = powershell -File scripts/find_cef.ps1
        Write-Host "Downloading CEF from $url ..."
        New-Item -ItemType Directory -Force -Path vender
        Invoke-WebRequest -Uri $url -OutFile vender/cef.tar.bz2
        Write-Host "Extracting CEF..."
        tar -xf vender/cef.tar.bz2 -C vender
        $extractedDir = Get-ChildItem -Path vender -Filter "cef_binary_*" -Directory | Select-Object -First 1
        Rename-Item -Path $extractedDir.FullName -NewName "cef"
        Write-Host "CEF setup completed."


    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build Project (Release)
      run: cmake --build build --config Release --parallel

    - name: Create Release ZIP
      shell: powershell
      run: |
        Compress-Archive -Path build/Release/* -DestinationPath build/CEFDecklink-Release.zip
        Write-Host "ZIP package created."


    - name: Resolve tag name
      id: resolve_tag
      shell: powershell
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $tag = "${{ github.event.inputs.tag_name }}"
        } else {
          $tag = "${{ github.ref_name }}"
        }
        Write-Host "tag=$tag"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: build/CEFDecklink-Release.zip

  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up CEF (Chromium Embedded Framework)
      run: |
        URL=$(python3 scripts/find_cef.py macosarm64 minimal)
        echo "Downloading CEF from $URL ..."
        mkdir -p vender
        curl -L "$URL" -o vender/cef.tar.bz2
        echo "Extracting CEF..."
        tar -xf vender/cef.tar.bz2 -C vender
        EXTRACTED_DIR=$(find vender -maxdepth 1 -type d -name "cef_binary_*")
        mv "$EXTRACTED_DIR" vender/cef
        echo "CEF setup completed."


    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project (Release)
      run: cmake --build build --config Release --parallel

    - name: Create Release ZIP
      run: ./pack.sh

    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: DeckLinkDX11_mac.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Windows Artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: build-windows

    - name: Download macOS Artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-build
        path: build-mac

    - name: Create and push tag (manual run only)
      if: github.event_name == 'workflow_dispatch'
      run: |
        tag="${{ needs.build-windows.outputs.tag }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ $(git tag -l "$tag") ]; then
          git tag -d "$tag"
          git push origin ":refs/tags/$tag"
          echo "Cleaned old tag"
        fi
        git tag "$tag"
        git push origin "$tag"
        echo "Tag '$tag' created and pushed."

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build-windows.outputs.tag }}
        files: |
          build-windows/CEFDecklink-Release.zip
          build-mac/DeckLinkDX11_mac.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
